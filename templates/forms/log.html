
<form method="POST" action="/log">

<div class="form-group">
	<label for="game-name">Game name</label>
	<input type="text" name="game_name" id="game-name" class="form-control" required />
</div>

<div class="form-group">
	<label for="date-played">Date</label>
	<input type="date" name="date_played" id="date-played" class="form-control" required {% if today %}value="{{today}}"{% endif %}/>
</div>

<div class="form-group">
	<label for="tags">Tags</label>
	<input type="text" name="tags" id="tags" class="form-control" />
</div>

<div class="form-group">
	<label for="notes">Notes</label>
	<textarea id="notes"name="notes" class="form-control" rows="3"></textarea>
</div>

<button type="submit" class="btn btn-default">Log</button>
</form>
