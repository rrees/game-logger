
<form method="POST" action="/log">

<div class="form-group">
	<label for="game-name">Game name</label>
	<input type="text" name="game-name" id="game-name" class="form-control" required />
</div>

<div class="form-group">
	<label for="date-played">Date</label>
	<input type="date" name="date-played" id="date-played" class="form-control" required />
</div>

<button type="submit" class="btn btn-default">Log</button>
</form>
