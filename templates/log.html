{% extends 'base.html' %}

{% block title %}Log a game{% endblock %}

{% block body %}
<div class="container-fluid">
	<div class="row">
		<div class="col-md-12">
			<header>
			<h1>Log a new play</h1>
			</header>
		</div>
	</div>

	<div class="row">
		<div class="col-md-12">
		{% include 'forms/log.html' %}
		</div>
	</div>

	{% if log %}
	<div class="row">
		<div class="col-md-12">
		<form method="POST" action="/log/{{log.key.urlsafe()}}/delete" class="form-inline">
			<div class="form-group">
			<button type="submit" class="btn btn-default">Delete</button>
			</div>
		</form>
		</div>
	</div>
	{% endif %}

</div>

{% endblock %}
